name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Linux amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o nmapparser-linux-amd64 .

      - name: Build Linux arm64
        run: |
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o nmapparser-linux-arm64 .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nmapparser-linux-amd64
            nmapparser-linux-arm64
          generate_release_notes: true